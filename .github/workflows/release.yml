name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Smoke test packed CLI
        run: npm run smoke:pack

      - name: Check whether this version is already published on npm
        id: npm_status
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).name")"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm. Skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure npm token is configured when publishing is required
        if: steps.npm_status.outputs.published != 'true'
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not configured."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: steps.npm_status.outputs.published != 'true'
        shell: bash
        run: npm publish ./redker56-agentforge-*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: redker56-agentforge-*.tgz
          generate_release_notes: true
