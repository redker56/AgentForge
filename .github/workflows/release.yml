name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Prepare release notes from changelog
        run: node ./scripts/extract-changelog.mjs "${GITHUB_REF_NAME}" > release-notes.md

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Pack tarball
        run: npm pack

      - name: Smoke test packed CLI
        run: npm run smoke:pack

      - name: Check whether this version is already published on npm
        id: npm_status
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).name")"
          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm. Skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Select npm publish auth mode
        id: npm_auth
        if: steps.npm_status.outputs.published != 'true'
        shell: bash
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using NPM_TOKEN for npm publish."
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not configured. Falling back to npm trusted publishing."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with token auth
        if: steps.npm_status.outputs.published != 'true' && steps.npm_auth.outputs.mode == 'token'
        shell: bash
        run: npm publish ./redker56-agentforge-*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm with trusted publishing
        if: steps.npm_status.outputs.published != 'true' && steps.npm_auth.outputs.mode == 'trusted'
        shell: bash
        run: npm publish ./redker56-agentforge-*.tgz --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: redker56-agentforge-*.tgz
          body_path: release-notes.md
